ai_usage_summary: |
  Used Claude and Gemini for brainstorming, code review, and structural refactoring.
  No candidate data was shared with external API endpoints. The ranking pipeline runs fully locally and offline on CPU within 20 seconds.

methodology_summary: |
  A multi-stage, high-precision candidate discovery and ranking system. 
  1. Hard filters to disqualify honeypots (330 impossible timelines and skill inconsistencies identified), consulting-only profiles, and keyword stuffers (unrelated titles/headlines).
  2. Multi-feature heuristic scoring based on candidate experience alignment (5-9 years sweet spot), current title relevance, detailed ML/AI/Retrieval/Search skill proficiency and tenure, product/startup company background, and location/relocation preferences.
  3. Multiplicative behavioral signal multipliers based on last login activity, response rates, and open to work flags to score candidates by actual availability.
  Runs in ~16 seconds for 100K candidates on CPU.

